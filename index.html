<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrbitaX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080c;
    --bg-elev:#111118;
    --bg-card:#15151e;
    --gold:#c8a35b;
    --gold-soft:#e3c98a;
    --teal:#1f7a73;
    --teal-soft:#3fa89e;
    --text:#eae7e0;
    --muted:#83828d;
    --ring:rgba(200,163,91,0.35);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Jost', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient orbital backdrop */
  .orbit-field{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .orbit-field::before, .orbit-field::after{
    content:"";
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(200,163,91,0.08);
  }
  .orbit-field::before{
    width:140vmax; height:140vmax;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    animation:spin 220s linear infinite;
  }
  .orbit-field::after{
    width:90vmax; height:90vmax;
    top:50%; left:50%;
    border-color:rgba(63,168,158,0.07);
    transform:translate(-50%,-50%);
    animation:spin 160s linear infinite reverse;
  }
  @keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }

  .bg-glow{
    position:fixed;
    width:60vw; height:60vw;
    top:-20vw; right:-20vw;
    background:radial-gradient(circle, rgba(200,163,91,0.07), transparent 70%);
    z-index:0;
    pointer-events:none;
  }
  .bg-glow.b{
    top:auto; bottom:-25vw; right:auto; left:-20vw;
    background:radial-gradient(circle, rgba(63,168,158,0.06), transparent 70%);
  }

  header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:7rem 1.5rem 3.5rem;
  }
  .mark{
    width:54px; height:54px;
    margin:0 auto 1.6rem;
    position:relative;
  }
  .mark .ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:1px solid var(--gold);
    opacity:0.55;
  }
  .mark .ring:nth-child(2){
    inset:10px;
    border-color:var(--teal-soft);
    opacity:0.7;
  }
  .mark .core{
    position:absolute;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--gold-soft);
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 12px 2px var(--gold-soft);
  }
  .mark .satellite{
    position:absolute;
    width:4px; height:4px;
    border-radius:50%;
    background:var(--teal-soft);
    top:0; left:50%;
    transform-origin:2px 27px;
    animation:orbitspin 6s linear infinite;
    box-shadow:0 0 8px 1px var(--teal-soft);
  }
  @keyframes orbitspin{ to{ transform:translate(-50%,0) rotate(360deg) translate(0,0); } }

  h1{
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:clamp(2.4rem, 6vw, 3.6rem);
    letter-spacing:0.14em;
    background:linear-gradient(120deg, var(--gold-soft), var(--text) 45%, var(--teal-soft));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .tagline{
    margin-top:0.9rem;
    font-weight:300;
    letter-spacing:0.04em;
    color:var(--muted);
    font-size:0.95rem;
  }
  .count-pill{
    display:inline-block;
    margin-top:1.6rem;
    padding:0.45rem 1.3rem;
    border:1px solid rgba(200,163,91,0.3);
    border-radius:999px;
    font-size:0.78rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold-soft);
    background:rgba(200,163,91,0.05);
  }

  main{
    position:relative;
    z-index:2;
    max-width:1300px;
    margin:0 auto;
    padding:0 1.5rem 5rem;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
    gap:clamp(1.1rem, 2.5vw, 1.8rem);
  }

  .card{
    position:relative;
    aspect-ratio:1/1;
    border-radius:50%;
    cursor:pointer;
    overflow:hidden;
    background:var(--bg-card);
    border:1px solid rgba(200,163,91,0.18);
    transition:transform 0.4s cubic-bezier(.2,.8,.2,1), border-color 0.4s, box-shadow 0.4s;
  }
  .card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);
    pointer-events:none;
  }
  .card img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    filter:saturate(0.92) brightness(0.92);
    transition:filter 0.4s, transform 0.6s ease;
  }
  .card:hover{
    transform:translateY(-6px) scale(1.035);
    border-color:var(--gold);
    box-shadow:0 12px 30px -10px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,163,91,0.25), 0 0 24px rgba(63,168,158,0.18);
  }
  .card:hover img{
    filter:saturate(1) brightness(1);
    transform:scale(1.08);
  }
  .card .ring-deco{
    position:absolute; inset:-1px;
    border-radius:50%;
    border:1px solid transparent;
    background:conic-gradient(from 0deg, var(--gold), transparent 20%, transparent 80%, var(--teal-soft)) border-box;
    -webkit-mask:linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0;
    transition:opacity 0.4s;
    pointer-events:none;
  }
  .card:hover .ring-deco{ opacity:0.9; }

  .pager{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1.1rem;
    margin-top:3.5rem;
    flex-wrap:wrap;
  }
  .pager button{
    background:var(--bg-elev);
    border:1px solid rgba(200,163,91,0.25);
    color:var(--text);
    font-family:'Jost', sans-serif;
    letter-spacing:0.06em;
    font-size:0.85rem;
    padding:0.6rem 1.2rem;
    border-radius:999px;
    cursor:pointer;
    transition:border-color 0.3s, color 0.3s, background 0.3s;
  }
  .pager button:hover:not(:disabled){
    border-color:var(--gold);
    color:var(--gold-soft);
    background:rgba(200,163,91,0.08);
  }
  .pager button:disabled{
    opacity:0.3;
    cursor:default;
  }
  .pager .page-info{
    font-size:0.82rem;
    color:var(--muted);
    letter-spacing:0.08em;
    min-width:110px;
    text-align:center;
  }

  footer{
    position:relative; z-index:2;
    text-align:center;
    padding:2.5rem 1.5rem 3rem;
    color:var(--muted);
    font-size:0.75rem;
    letter-spacing:0.1em;
  }

  /* modal */
  .modal{
    position:fixed; inset:0;
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(4,4,7,0.92);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    padding:2rem;
    opacity:0;
    transition:opacity 0.3s ease;
  }
  .modal.open{
    display:flex;
    opacity:1;
  }
  .modal-inner{
    position:relative;
    max-width:min(92vw, 920px);
    max-height:88vh;
    transform:scale(0.96);
    transition:transform 0.3s ease;
  }
  .modal.open .modal-inner{ transform:scale(1); }
  .modal-inner img{
    max-width:100%;
    max-height:88vh;
    display:block;
    border-radius:6px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(200,163,91,0.2);
  }
  .modal-close{
    position:absolute;
    top:-2.6rem; right:0;
    background:none;
    border:1px solid rgba(234,231,224,0.25);
    color:var(--text);
    width:38px; height:38px;
    border-radius:50%;
    font-size:1.1rem;
    cursor:pointer;
    transition:border-color 0.3s, color 0.3s;
  }
  .modal-close:hover{ border-color:var(--gold); color:var(--gold-soft); }

  .modal-nav{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    background:rgba(17,17,24,0.7);
    border:1px solid rgba(200,163,91,0.25);
    color:var(--text);
    width:46px; height:46px;
    border-radius:50%;
    font-size:1.2rem;
    cursor:pointer;
    z-index:51;
    transition:border-color 0.3s, color 0.3s, background 0.3s;
  }
  .modal-nav:hover{ border-color:var(--gold); color:var(--gold-soft); background:rgba(200,163,91,0.1); }
  .modal-nav.prev{ left:1.5rem; }
  .modal-nav.next{ right:1.5rem; }

  @media (max-width:640px){
    header{ padding:5rem 1.2rem 2.5rem; }
    .grid{ grid-template-columns:repeat(auto-fill, minmax(110px,1fr)); gap:0.9rem; }
    .modal-nav{ width:38px; height:38px; font-size:1rem; }
    .modal-nav.prev{ left:0.6rem; }
    .modal-nav.next{ right:0.6rem; }
  }

  @media (prefers-reduced-motion: reduce){
    .orbit-field::before, .orbit-field::after, .mark .satellite{ animation:none; }
    .card, .card img, .modal, .modal-inner{ transition:none; }
  }
</style>
</head>
<body>

<div class="orbit-field"></div>
<div class="bg-glow"></div>
<div class="bg-glow b"></div>

<header>
  <div class="mark">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="core"></div>
    <div class="satellite"></div>
  </div>
  <h1>OrbitaX</h1>
  <p class="tagline">A quiet constellation of moments</p>
  <span class="count-pill" id="countPill"></span>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="pager">
    <button id="prevPage">&larr; Prev</button>
    <span class="page-info" id="pageInfo"></span>
    <button id="nextPage">Next &rarr;</button>
  </div>
</main>

<footer>OrbitaX &mdash; Anonymous Gallery</footer>

<div class="modal" id="modal">
  <button class="modal-nav prev" id="navPrev" aria-label="Previous">&#8249;</button>
  <div class="modal-inner">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <img id="modalImg" src="" alt="">
  </div>
  <button class="modal-nav next" id="navNext" aria-label="Next">&#8250;</button>
</div>

taX/main/FB_IMG_1782826526109.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826529146.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826531746.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826533941.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826536142.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826550399.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826555550.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826565225.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826569076.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826571922.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826576138.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826580770.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782826584030.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782827089306.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782827099871.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782827113512.jpg", "https://raw.githubusercontent.com/InfiniteProfile/OrbitaX/main/FB_IMG_1782827116658.jpg"];

  const PER_PAGE = 48;
  let currentPage = 0;
  let activeIndex = -1;

  const grid = document.getElementById('grid');
  const pageInfo = document.getElementById('pageInfo');
  const prevPageBtn = document.getElementById('prevPage');
  const nextPageBtn = document.getElementById('nextPage');
  const countPill = document.getElementById('countPill');
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');
  const modalClose = document.getElementById('modalClose');
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');

  countPill.textContent = IMAGES.length + ' photos';

  function totalPages(){
    return Math.ceil(IMAGES.length / PER_PAGE);
  }

  function renderPage(page){
    currentPage = Math.max(0, Math.min(page, totalPages() - 1));
    const start = currentPage * PER_PAGE;
    const end = Math.min(start + PER_PAGE, IMAGES.length);

    grid.innerHTML = '';
    for(let i = start; i < end; i++){
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;

      const img = document.createElement('img');
      img.src = IMAGES[i];
      img.loading = 'lazy';
      img.alt = '';

      const deco = document.createElement('div');
      deco.className = 'ring-deco';

      card.appendChild(img);
      card.appendChild(deco);
      card.addEventListener('click', () => openModal(i));
      grid.appendChild(card);
    }

    pageInfo.textContent = 'Page ' + (currentPage + 1) + ' of ' + totalPages();
    prevPageBtn.disabled = currentPage === 0;
    nextPageBtn.disabled = currentPage === totalPages() - 1;
    window.scrollTo({ top: main.offsetTop - 20, behavior: 'smooth' });
  }

  const main = document.querySelector('main');

  prevPageBtn.addEventListener('click', () => renderPage(currentPage - 1));
  nextPageBtn.addEventListener('click', () => renderPage(currentPage + 1));

  function openModal(index){
    activeIndex = index;
    modalImg.src = IMAGES[index];
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(){
    modal.classList.remove('open');
    document.body.style.overflow = '';
    activeIndex = -1;
  }

  function showNext(){
    if(activeIndex === -1) return;
    activeIndex = (activeIndex + 1) % IMAGES.length;
    modalImg.src = IMAGES[activeIndex];
  }

  function showPrev(){
    if(activeIndex === -1) return;
    activeIndex = (activeIndex - 1 + IMAGES.length) % IMAGES.length;
    modalImg.src = IMAGES[activeIndex];
  }

  modalClose.addEventListener('click', closeModal);
  navNext.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
  navPrev.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });

  modal.addEventListener('click', (e) => {
    if(e.target === modal) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if(!modal.classList.contains('open')) return;
    if(e.key === 'Escape') closeModal();
    if(e.key === 'ArrowRight') showNext();
    if(e.key === 'ArrowLeft') showPrev();
  });

  // basic touch swipe support
  let touchStartX = 0;
  modal.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; }, {passive:true});
  modal.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 50){
      if(dx < 0) showNext(); else showPrev();
    }
  }, {passive:true});

  renderPage(0);
</script>
